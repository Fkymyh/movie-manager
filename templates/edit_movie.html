<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>映画編集</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <nav class="nav-menu">
        <a href="/">ホーム</a>
        <a href="/search">映画検索</a>
        <a href="/favorites">マイリスト</a>
    </nav>

    <div class="movie-card">

        {% if movie[3] %}
        <img src="https://image.tmdb.org/t/p/w300{{ movie[3]}}">
        {% endif %}

        <div>

            <h1>{{ movie[1] }}</h1>

            <p>公開日: {{ movie[2] }}</p>

            <form action="/movie/{{ movie[0] }}/update" method="post">

                <p>
                    <label>
                        <input type="checkbox" name="watched" {% if movie[4] %}checked{% endif %}>
                        視聴済み
                    </label>
                </p>

                <p>
                    評価:

                    <select name="rating">
                        {% for i in range(1, 6) %}
                        <option value="{{ i }}" {% if movie[5]==i %}selected{% endif %}>
                            {{ i }}
                        </option>
                        {% endfor %}
                    </select>
                </p>

                <p> 感想:</p>

                <textarea name="memo" rows="5" cols="50">{{ movie[6] }}</textarea>

                <br><br>

                <button type="submit">
                    保存
                </button>

            </form>
        </div>
    </div>


</body>

</html>
