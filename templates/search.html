<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>検索結果 | 映画検索アプリ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <nav class="nav-menu">
        <a href="/">ホーム</a>
        <a href="/search">映画検索</a>
        <a href="/favorites">マイリスト</a>
    </nav>
    <form action="/search" method="get" class="search-box">
        <input type="text" name="keyword" value="{{ keyword }}" placeholder="映画タイトルを入力" required autofocus>

        <button type="submit">検索</button>
    </form>


    <!-- TMDBから返された各作品を、保存フォームとともに表示する。 -->
    {% for movie in movies %}
    <div class="movie-card">

        {% if movie.poster_path %}
        <img src="https://image.tmdb.org/t/p/w300{{ movie.poster_path }}" alt="{{ movie.title }} ポスター" width="200">
        {% endif %}

        <div>
            <h2>{{ movie.title }}</h2>
            <p>公開日: {{ movie.release_date }}</p>
            <p>{{ movie.overview }}</p>
        </div>

        <!-- 画面に表示した映画情報をPOSTし、マイリストへ登録する。 -->
        <form action="/save" method="post">

            <input type="hidden" name="keyword" value="{{ keyword}}">

            <input type="hidden" name="movie_id" value="{{movie.id }}">
            <input type="hidden" name="title" value="{{ movie.title }}">
            <input type="hidden" name="release_date" value="{{ movie.release_date }}">
            <input type="hidden" name="poster_path" value="{{ movie.poster_path }}">

            <button type="submit">
                お気に入り登録
            </button>

        </form>



    </div>
    {% endfor %}
</body>

</html>
